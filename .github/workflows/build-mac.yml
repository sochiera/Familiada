name: Build macOS .app

on:
  # Uruchom ręcznie z zakładki Actions na GitHub
  workflow_dispatch:
  # Lub automatycznie przy pushu na main
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest   # Apple Silicon — budujemy universal2 (Intel + ARM w jednym)

    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Zainstaluj Python 3.12 universal2 (z python.org)
        run: |
          # Oficjalny installer python.org to jedyny pewny sposób na universal2 build.
          # Jeśli kiedyś URL przestanie działać, zmień wersję na aktualną 3.12.x z python.org/downloads
          curl -fsSL https://www.python.org/ftp/python/3.12.9/python-3.12.9-macos11.pkg -o python.pkg
          sudo installer -pkg python.pkg -target /
          echo "/Library/Frameworks/Python.framework/Versions/3.12/bin" >> $GITHUB_PATH

      - name: Zainstaluj zależności
        run: |
          python3.12 -m pip install --upgrade pip
          python3.12 -m pip install pygame pyinstaller

      - name: Pobierz czcionkę VT323 (jeśli nie ma w repo)
        run: |
          if [ ! -f fonts/VT323-Regular.ttf ]; then
            echo "Pobieranie czcionki VT323..."
            curl -fsSL "https://github.com/googlefonts/vt323/raw/main/fonts/ttf/VT323-Regular.ttf" \
              -o fonts/VT323-Regular.ttf
          else
            echo "Czcionka już jest w repozytorium."
          fi

      - name: Zbuduj universal2 .app (PyInstaller)
        run: |
          python3.12 -m PyInstaller familiada.spec --target-arch universal2 --noconfirm

      - name: Spakuj .app do ZIP
        run: |
          cd dist
          zip -r ../Familiada-macOS.zip Familiada.app
          cd ..

      - name: Wgraj artefakt
        uses: actions/upload-artifact@v4
        with:
          name: Familiada-macOS
          path: Familiada-macOS.zip
          retention-days: 30
